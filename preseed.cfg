#_preseed_V1

### Locale and keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string echofree
d-i netcfg/get_domain string local
d-i hw-detect/load_firmware boolean true

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Account
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Jerry
d-i passwd/username string jerry
# Prototype-only plaintext password. Change immediately after installation.
d-i passwd/user-password password echofree
d-i passwd/user-password-again password echofree

### Clock
d-i clock-setup/utc boolean true
d-i time/zone string America/Chicago
d-i clock-setup/ntp boolean true

### Partitioning
# WARNING: this selects the first detected disk and erases it.
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman/early_command string debconf-set partman-auto/disk "$(list-devices disk | head -n1)"
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Packages
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string sudo curl ca-certificates gnupg git jq avahi-daemon pipewire pipewire-pulse wireplumber alsa-utils pulseaudio-utils dbus-user-session
d-i pkgsel/upgrade select safe-upgrade
popularity-contest popularity-contest/participate boolean false

### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string default

### Copy EchoFree payload and run provisioner
d-i preseed/late_command string \
  mkdir -p /target/opt/echofree-installer; \
  cp -a /cdrom/echofree/. /target/opt/echofree-installer/; \
  in-target chmod +x /opt/echofree-installer/provision.sh; \
  in-target /opt/echofree-installer/provision.sh

### Finish
d-i finish-install/reboot_in_progress note
